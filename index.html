<!DOCTYPE html>
<html>
  <head>
    <title>Webchat embedding</title>
    <meta name="viewport" content="width=device-width" />
    <style>
      html {
        background-color: #bbb;
      }
    </style>
  </head>

  <body>
    <!-- Start of the Cognigy Webchat embedding code -->
    <script src="https://github.com/Cognigy/Webchat/releases/latest/download/webchat.js"></script>

    <script>
      const DELAY = 500; // Milliseconds of delay between the message to show the typing indicator is received from the flow and actually showing the indicator
      const setIndicatorVisibility = (visible) => {
        const indicatorElement = document.querySelector(
          "[data-cognigy-webchat-root] .webchat-typing-indicator"
        );

        if (visible && indicatorElement) {
          indicatorElement.style.visibility = "visible";
        } else {
          indicatorElement.style.visibility = "hidden";
        }
      };
      const endpointUrl =
        "https://webchat-trial.cognigy.ai/v3/e23092ea623eae62f0187d34d36ef91ba3d1ee11ecb6032d7ccc3938ca9351e1";
      initWebchat(endpointUrl).then((webchat) => {
        window.cognigyWebchat = webchat;
        webchat.registerAnalyticsService((event) => {
          // Typing indicator
          if (event?.payload?.data?.showTypingIndicator) {
            // The flow told the webchat to show the typing indicator
            setTimeout(setIndicatorVisibility, DELAY, true); // Show the indicator after DELAY, so that default typing indicator mechanism runs first
          } else if (event?.payload?.data?.hideTypingIndicator) {
            // The flow told the webchat to hide the typing indicator
            setTimeout(setIndicatorVisibility, DELAY, false); // Hide the indicator after DELAY
          }
        });
      });
    </script>
  </body>
</html>
